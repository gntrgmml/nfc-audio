<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NFC Audio Player</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .container {
      text-align: center;
      padding: 24px;
    }

    h1 {
      margin-bottom: 16px;
    }

    #playBtn {
      font-size: 2rem;
      font-weight: bold;
      padding: 32px 48px;
      min-width: 280px;
      min-height: 140px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
    }

    audio {
      margin-top: 24px;
      width: min(90vw, 420px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>NFC Audio Player</h1>
    <button id="playBtn">▶ PLAY AUDIO</button>
    <audio id="player" controls preload="auto">
      <source src="audio/test.mp3" type="audio/mpeg">
      Your browser does not support audio playback.
    </audio>
  </div>

  <script>
    const audio = document.getElementById("player");
    const playBtn = document.getElementById("playBtn");

    playBtn.addEventListener("click", async () => {
      try {
        await audio.play();
      } catch (e) {
        console.error("Playback failed:", e);
      }
    });
  </script>
</body>
</html>
